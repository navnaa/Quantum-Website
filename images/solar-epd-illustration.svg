<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#123832"/>
      <stop offset="100%" stop-color="#0B1F1C"/>
    </linearGradient>
    <linearGradient id="panelFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7DA6"/>
      <stop offset="100%" stop-color="#1C4A42"/>
    </linearGradient>
    <linearGradient id="cabinetFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F4EC"/>
      <stop offset="100%" stop-color="#EFEADB"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="640" height="480" rx="16" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="516" cy="86" r="38" fill="#F2A73B" opacity="0.9"/>
  <g stroke="#F2A73B" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <line x1="516" y1="24" x2="516" y2="8"/>
    <line x1="516" y1="164" x2="516" y2="148"/>
    <line x1="454" y1="86" x2="438" y2="86"/>
    <line x1="578" y1="120" x2="590" y2="128"/>
    <line x1="452" y1="120" x2="440" y2="128"/>
    <line x1="578" y1="52" x2="590" y2="44"/>
  </g>

  <!-- ground -->
  <rect x="0" y="392" width="640" height="88" fill="#0E2E29"/>
  <rect x="0" y="392" width="640" height="4" fill="#2E7DA6" opacity="0.5"/>

  <!-- solar array: 3 tilted panels on a mounting rack -->
  <g>
    <!-- rack legs -->
    <rect x="70" y="330" width="8" height="70" fill="#587F76"/>
    <rect x="330" y="330" width="8" height="70" fill="#587F76"/>
    <rect x="590" y="330" width="8" height="70" fill="#587F76"/>

    <!-- panel 1 -->
    <g>
      <rect x="40" y="230" width="230" height="110" rx="6" fill="url(#panelFace)" stroke="#0B1F1C" stroke-width="2"/>
      <g stroke="#0B1F1C" stroke-width="2" opacity="0.6">
        <line x1="97" y1="230" x2="97" y2="340"/>
        <line x1="154" y1="230" x2="154" y2="340"/>
        <line x1="211" y1="230" x2="211" y2="340"/>
        <line x1="40" y1="285" x2="270" y2="285"/>
      </g>
    </g>

    <!-- panel 2 (center, slightly forward) -->
    <g>
      <rect x="300" y="220" width="240" height="118" rx="6" fill="url(#panelFace)" stroke="#0B1F1C" stroke-width="2"/>
      <g stroke="#0B1F1C" stroke-width="2" opacity="0.6">
        <line x1="360" y1="220" x2="360" y2="338"/>
        <line x1="420" y1="220" x2="420" y2="338"/>
        <line x1="480" y1="220" x2="480" y2="338"/>
        <line x1="300" y1="279" x2="540" y2="279"/>
      </g>
    </g>
  </g>

  <!-- DC cable run from array down to the protection cabinet -->
  <path d="M 270 300 C 320 360, 340 370, 372 372" fill="none" stroke="#F2A73B" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <path d="M 420 338 L 420 372" fill="none" stroke="#F2A73B" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

  <!-- protection / combiner cabinet -->
  <g>
    <rect x="372" y="372" width="120" height="96" rx="6" fill="url(#cabinetFace)" stroke="#0B1F1C" stroke-width="2"/>
    <rect x="372" y="372" width="120" height="22" rx="6" fill="#123832"/>
    <text x="432" y="387" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#F2A73B" font-weight="600">DC PROTECTION</text>

    <!-- surge / lightning bolt icon -->
    <path d="M 424 404 L 412 428 L 422 428 L 418 448 L 438 420 L 427 420 Z" fill="#F2A73B"/>

    <!-- status LEDs -->
    <circle cx="458" cy="410" r="4" fill="#4C9A6A"/>
    <circle cx="458" cy="424" r="4" fill="#F2A73B"/>
    <circle cx="458" cy="438" r="4" fill="#2E7DA6"/>

    <!-- terminal strip at base -->
    <rect x="382" y="452" width="100" height="8" rx="2" fill="#5B6D66"/>
  </g>

  <!-- panel 3, foreground left, smaller for depth -->
  <g>
    <rect x="6" y="300" width="70" height="42" rx="4" fill="url(#panelFace)" stroke="#0B1F1C" stroke-width="2" opacity="0.85"/>
  </g>
</svg>
